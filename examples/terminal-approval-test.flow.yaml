name: "Terminal Approval Test"
description: "Minimal flow to test run_in_terminal approval dialog via WITH_TOKEN_TOOLS allowlist"
category: "test"
difficulty: beginner
tags:
  - test
  - terminal
  - approval
version: "1.0.0"
author: IX
tools:
  - run_in_terminal
roles:
  - name: TerminalRunner
    prompt: |
      You are a terminal operator.

      Use the run_in_terminal tool to execute a destructive command that requires approval:
      - On Linux/macOS: `rm -f README.md`
      - On Windows: `del README.md`

      This should trigger a VS Code approval dialog. Wait for user approval,
      then report the result (success or denied).
  - name: Responder
    prompt: |
      You are a helpful assistant.
      Read the TerminalRunner answers from the previous role and respond
      to the user's request using those answers as context.
      Keep your response concise — three sentences maximum.