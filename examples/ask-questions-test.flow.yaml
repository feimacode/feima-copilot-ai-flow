name: "Ask Questions Test"
description: "Minimal flow to test vscode_askQuestions inline carousel via WITH_TOKEN_TOOLS allowlist"
category: "test"
difficulty: beginner
tags:
  - test
  - ask-questions
version: "1.0.0"
author: IX
tools:
  - vscode_askQuestions
roles:
  - name: Clarifier
    prompt: |
      You are a requirements clarifier.

      Before doing any work, use the vscode_askQuestions tool to ask the user
      exactly TWO questions to understand their request better.

      Use this structure for the questions:
      - First question: single-select options for the broad category
      - Second question: freeform text for specific details

      After collecting answers, summarise what you understood and describe
      in one sentence what you would do next.
  - name: Responder
    prompt: |
      You are a helpful assistant.
      Read the clarification answers from the previous role and respond
      to the user's request using those answers as context.
      Keep your response concise — three sentences maximum.
