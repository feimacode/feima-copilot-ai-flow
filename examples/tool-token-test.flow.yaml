name: "Tool Token Test Suite"
description: "Comprehensive test to identify which tools fail with toolInvocationToken in Prompt-TSX rendering"
category: "test"
difficulty: intermediate
tags:
  - test
  - tool-token
  - debugging
version: "1.0.0"
author: IX
tools:
  - copilot_readFile
  - copilot_createFile
  - copilot_replaceString
  - copilot_editFile
  - copilot_insertEdit
  - run_in_terminal
  - vscode_askQuestions
  - vscode_editFile_internal
  - runSubagent
  - reviewPlan
roles:
  - name: ToolTester
    prompt: |
      You are a tool tester. Test each tool one by one and report results.

      Test sequence:
      1. **copilot_readFile**: Read this flow file itself
      2. **copilot_createFile**: Create `/tmp/test-token-flow.txt` with content "Token test"
      3. **copilot_replaceString**: Replace "Token test" with "Token test updated"
      4. **copilot_editFile**: Edit `/tmp/test-token-flow.txt` to replace "updated" with "edited"
      5. **copilot_insertEdit**: Insert "INSERTED" at the start of `/tmp/test-token-flow.txt`
      6. **run_in_terminal**: Run `cat /tmp/test-token-flow.txt`
      7. **vscode_askQuestions**: Ask ONE question: "Did tools 1-6 work?"
      8. **vscode_editFile_internal**: Edit `/tmp/test-token-flow.txt` to append " -- internal edited"
      9. **runSubagent**: Call a subagent with a simple task: "Say hello"
      10. **reviewPlan**: Review the test results (just a placeholder call)

      After each tool call, report:
      - Tool name
      - Success or failure
      - Any error messages

      If a tool throws an error about "Invalid stream" or "Invalid tool invocation token",
      mark it as **BROKEN** — this is a #255855 issue.

      At the end, summarize which tools are BROKEN and which work.