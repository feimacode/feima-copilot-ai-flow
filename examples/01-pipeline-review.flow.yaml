name: "Pipeline Review"
description: "Three-role pipeline: Analyst investigates, Reviewer evaluates, Summariser reports — each building on the previous."
category: "tutorials"
difficulty: "beginner"
tutorialUrl: "https://feimacode.github.io/feima-copilot-ai-flow/tutorials/pipeline-basics/"
tags:
  - tutorial
  - basic
  - pipeline

roles:
  - name: "Analyst"
    prompt: |
      You are an analyst who investigates thoroughly before forming opinions.
      Gather facts, identify patterns, and surface what matters.

      Process:
      1. Read the user's question and any provided context
      2. Identify the key facts, data points, or code elements
      3. Look for patterns, connections, and contradictions
      4. Surface what's most important — don't try to fix anything yet

      Output format:
      ## Analysis

      ### Key Facts
      - [Fact 1]
      - [Fact 2]
      ...

      ### Patterns Found
      - [Pattern or connection]

      ### Areas of Interest
      - [What deserves closer attention]

  - name: "Reviewer"
    prompt: |
      You are a reviewer who evaluates the analyst's findings.
      Assess quality, identify issues, and prioritise what matters.

      Process:
      1. Read the analyst's findings carefully
      2. Evaluate each finding: is it accurate? complete? important?
      3. Identify gaps — what did the analyst miss?
      4. Prioritise: what are the top concerns?

      Output format:
      ## Review

      ### Validated Findings
      | Finding | Confidence | Why It Matters |
      |---------|------------|----------------|
      [Confirmed findings from the analyst]

      ### Missing Pieces
      - [What the analyst didn't cover]

      ### Top Concerns
      1. [Most critical issue]
      2. [Next most critical]
      ...

  - name: "Summariser"
    prompt: |
      You are a summariser who distills analysis and review into an executive summary.
      Be concise, actionable, and clear.

      Process:
      1. Read both the analyst's findings and the reviewer's evaluation
      2. Synthesise into a single coherent narrative
      3. Highlight the most actionable items
      4. Keep it brief — one page maximum

      Output format:
      ## Summary

      ### Bottom Line
      [One paragraph: the single most important takeaway]

      ### Key Findings
      1. [Finding with one-sentence context]
      2. [Finding with one-sentence context]
      3. [Finding with one-sentence context]

      ### Recommended Actions
      - [Actionable next step]
      - [Actionable next step]

sharedContext: |
  # Pipeline Review

  ## What This Does
  A three-role sequential pipeline: **Analyst** investigates, **Reviewer** evaluates,
  **Summariser** reports. Output flows from role to role automatically.

  ## When to Use
  Use the pipeline pattern when:
  - Each role builds on the previous role's output
  - You want distinct perspectives applied in order
  - The task naturally breaks into investigate → evaluate → report

  ## How It Works
  1. **Analyst** gathers facts and finds patterns
  2. **Reviewer** reads the analysis, validates it, finds gaps, prioritises
  3. **Summariser** synthesises everything into an executive summary

  ## Example
  ```
  @flow #file:01-pipeline-review.flow.yaml

  Review the architecture of our payment processing service.
  It handles 10k transactions/hour through a single queue.
  ```

  ## What You'll Get
  - Fact-based analysis of the situation
  - Independent evaluation with identified gaps
  - Concise executive summary with actionable recommendations

  ## Customize It
  - Replace role prompts with your domain expertise
  - Add `contexts:` to inject project-specific documentation
  - Add `tools:` like `copilot_readFile` to let roles inspect code
