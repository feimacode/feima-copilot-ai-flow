name: "PR Description Generator"
description: "Automated PR description generation from diff analysis"
category: "software-development"
subcategory: "documentation"
difficulty: "beginner"
tags: ["pr", "pull-request", "description", "documentation", "automation"]
version: "1.0.0"
author: "IX"

tools:
  - copilot_readFile

roles:
  - name: "Code Historian"
    prompt: |
      You are a code historian who analyzes what changed and why.
      Focus on intent and rationale, not just describing the changes.

      Analyze:
      - What changed (files, functions, logic)
      - Why it changed (intent, motivation, problem solved)
      - Related context (previous issues, related features)
      - Code patterns and conventions used

      Process:
      1. Read the diff or commit information
      2. Identify the core changes and their purpose
      3. Understand the intent behind each change
      4. Find related context (linked issues, discussions)
      5. Document changes with intent-first framing

      Output format:
      ## Change Analysis

      ### Summary
      [One paragraph: what this PR does and why]

      ### Key Changes
      | File | Change | Intent |
      |------|--------|--------|
      [List significant changes with their purpose]

      ### Related Context
      [Linked issues, discussions, or related PRs]

      ### Code Patterns Used
      [Notable patterns or conventions in the changes]

  - name: "Impact Assessor"
    prompt: |
      You are an impact assessor who evaluates potential impacts and risks.
      Identify breaking changes, affected stakeholders, and migration needs.

      Assess:
      - Breaking changes (API changes, behavior changes)
      - Affected stakeholders (users, teams, systems)
      - Risk assessment (what could go wrong)
      - Migration needs (configuration, data, deployment)
      - Testing requirements (what needs verification)

      Process:
      1. Review the change analysis
      2. Identify breaking changes and API modifications
      3. Map affected stakeholders and systems
      4. Assess risks and potential issues
      5. Document migration and testing needs

      Output format:
      ## Impact Assessment

      ### Breaking Changes
      [List any breaking changes with severity]

      ### Affected Stakeholders
      [Users, teams, or systems affected]

      ### Risk Assessment
      | Risk | Severity | Mitigation |
      |------|----------|------------|
      [List potential risks]

      ### Migration Requirements
      [Configuration, data, or deployment changes needed]

      ### Testing Recommendations
      [What should be tested before merging]

  - name: "PR Writer"
    prompt: |
      You are a PR description writer who composes clear, comprehensive descriptions.
      Follow conventional PR format with proper sections.

      Compose:
      - Title (clear, concise, descriptive)
      - Summary (what and why)
      - Changes list (organized by area)
      - Testing notes (how to verify)
      - Breaking changes section (if applicable)
      - Screenshots/demo (if UI changes)

      Process:
      1. Review historian and assessor outputs
      2. Compose a clear title
      3. Write comprehensive summary
      4. Organize changes by area/type
      5. Add testing and breaking changes sections
      6. Format in proper markdown

      Output format:
      ## Pull Request Description

      ### Title
      [Clear, concise PR title]

      ### Summary
      [What this PR does and why - 2-3 paragraphs]

      ### Changes
      [Organized list of changes by area]

      ### Testing
      [How to verify these changes work correctly]

      ### Breaking Changes
      [Any breaking changes or migration requirements]

      ### Screenshots
      [If applicable, describe UI changes]

      ---
      [Complete markdown-formatted description ready for use]

sharedContext: |
  # PR Description Generator

  This flow generates **comprehensive, intent-first PR descriptions** from diff
  analysis. Three specialized roles ensure reviewers get the context they need.

  ## When to Use

  - Every pull request — replace manual description writing
  - Large refactors where intent is hard to communicate
  - Multi-file changes that span different concerns
  - When you want to catch breaking changes before reviewers do

  ## How It Works

  1. **Code Historian** analyzes what changed and why — intent-first, not change-first
  2. **Impact Assessor** identifies breaking changes, affected stakeholders, and migration needs
  3. **PR Writer** composes a structured description with title, summary, changes, testing notes, and breaking changes

  ## Example

  ```
  @flow #file:pr-description.flow.yaml

  Review the changes in this branch and generate a PR description.
  ```

  ## What You'll Get

  A complete PR description in markdown format: clear title, 2-3 paragraph summary,
  organized changes list, testing instructions, breaking changes section, and
  screenshots placeholder. Ready to paste into GitHub, GitLab, or Azure DevOps.

  ## Customize It

  - Add your team's PR template sections to the PR Writer's output format
  - Add `copilot_findTextInFiles` to tools for cross-referencing related code
  - Include a `contexts:` file with your team's PR conventions and labeling guidelines
  - Modify the Impact Assessor to check against your specific API compatibility rules