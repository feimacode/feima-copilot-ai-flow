name: Prompt File Demo
description: Demonstrates prompt file reference support - inline, URI, and filename formats
category: software-development
subcategory: code-quality
difficulty: beginner
tags:
  - demo
  - prompt-files
  - example


roles:
  # Inline prompt (traditional format)
  - name: Inline Reviewer
    prompt: |
      You are a senior code reviewer. Focus on:
      - Code quality and maintainability
      - Best practices adherence
      - Potential bugs and edge cases
      
  # Prompt file reference by name (searches in .github/prompts/, .vscode/prompts/, etc.)
  - name: Named Prompt Reviewer
    prompt:
      name: security-review  # Will search for security-review.prompt.md in default folders
      
  # Prompt file reference by URI (absolute path)
  - name: Path Prompt Reviewer
    prompt:
      path: /absolute/path/to/custom-review.prompt.md
    model: claude-sonnet-4.5

sharedContext: |
  This is a demonstration of the prompt file reference feature.
  All three formats are supported: inline string, filename search, and path reference.