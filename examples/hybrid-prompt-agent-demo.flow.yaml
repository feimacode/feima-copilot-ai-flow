name: Hybrid Prompt and Agent Demo
description: Comprehensive example showing all combinations of inline prompts, prompt files, and agent files
category: software-development
subcategory: ai-workflows
difficulty: intermediate
tags:
  - demo
  - prompt-files
  - agent-files
  - hybrid


roles:
  # Role 1: Inline prompt only
  - name: Code Reviewer
    prompt: |
      You are a code reviewer.
      Focus on:
      - Code quality
      - Best practices
      - Potential bugs
      - Maintainability

  # Role 2: Prompt file reference
  - name: Security Auditor
    prompt:
      name: security-review  # Searches for security-review.prompt.md

  # Role 3: Agent file reference
  - name: Feature Developer
    agent: coder  # Searches for coder.agent.md

  # Role 4: Prompt file with path
  - name: Performance Analyst
    prompt:
      path: /absolute/path/to/performance-analysis.prompt.md
    model: claude-sonnet-4.5

  # Role 5: Agent file with path and delegation
  - name: Test Engineer
    agent:
      path: /absolute/path/to/test-engineer.agent.md
    delegate: true  # Route via Copilot SDK

  # Role 6: Agent file with relative path
  - name: Documentation Writer
    agent: .github/agents/doc-writer.agent.md

  # Role 7: Prompt file with relative path
  - name: Style Checker
    prompt:
      path: .github/prompts/style-check.prompt.md

contexts:
  - README.md
  - CONTRIBUTING.md

skills:
  - python-fact-grounded-coding
  - pylance-docs

tools:
  - read_file
  - write_file
  - search

sharedContext: |
  # Hybrid Prompt and Agent Reference Demo

  This flow demonstrates all supported formats for prompt and agent references:

  ## Prompt Formats
  1. **Inline**: `prompt: |` with multiline string
  2. **Name search**: `prompt: { name: "security-review" }`
  3. **Path reference**: `prompt: { path: "/absolute/path" }`
  4. **Relative path**: `prompt: { path: ".github/prompts/file.prompt.md" }`

## Agent Formats
  1. **Name search**: `agent: coder`
  2. **Path reference**: `agent: { path: "/absolute/path" }`
  Use `delegate: true` to route agent execution via Copilot SDK instead of VS Code LM API.

  ## Context
  Flow-level `contexts:` are inherited by all roles. Role-specific `contexts:` override flow-level ones.

  ## Skills and Tools
  Flow-level `skills:` and `tools:` are inherited by all roles. Role-specific ones override flow-level ones.