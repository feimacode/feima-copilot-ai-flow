name: "Parallel Autonomous Worktrees"
description: "Fork-join with per-group worktree isolation — two independent teams build and test in separate worktrees, then a join role verifies the integration."
category: "software-development"
model: "claude-sonnet-4.5"
customAgent: "___vscode_default___"
difficulty: advanced
tags: ["parallel", "worktree", "isolation", "fork-join"]
version: "2.0.0"
author: "IX"

groups:
  - name: "Feature Team"
    isolation: worktree
    roles:
      - name: "Feature Developer"
        prompt: |
          You are an autonomous feature developer.
          Implement complete features from specifications.

          Process:
          1. Read existing code to understand context
          2. Create new files as needed
          3. Modify existing files carefully
          4. Update documentation

          Write production-quality code with proper error handling.

  - name: "Test Team"
    isolation: worktree
    roles:
      - name: "Test Engineer"
        prompt: |
          You are a test automation engineer.
          Write comprehensive tests for the feature described in the user query.

          For each feature:
          - Generate unit tests covering happy paths
          - Add edge-case tests
          - Test error conditions and boundaries

          Use the project's existing testing framework and conventions.

join:
  name: "Integration Reviewer"
  prompt: |
    You are a senior integration reviewer.
    You receive independent outputs from a Feature Team and a Test Team.

    Your job:
    1. Review the feature implementation against the tests
    2. Identify any gaps — untested code paths or failing assertions
    3. Recommend which worktree to merge first (or whether to combine both)
    4. List any conflicts or integration issues

    Be concise: a numbered list of findings followed by a clear recommendation.

sharedContext: |
  # Fork-Join with Worktree Isolation

  This example demonstrates the **fork-join** pattern with **per-group worktree isolation**.

  - Two independent groups run in separate Git worktrees so their changes never conflict
  - The **join** role receives both outputs and decides how to integrate them
  - Add `delegate: true` to any role to route it through the GitHub Copilot SDK for autonomous background execution

  ## Worktree Workflow

  1. Each group's agent creates its own isolated worktree
  2. Feature Team writes the implementation
  3. Test Team writes the tests (independently and in parallel)
  4. Integration Reviewer evaluates both outputs and recommends a merge plan

  ## SDK Delegation

  To run a role autonomously via the Copilot SDK instead of the VS Code LM API,
  add `delegate: true`:

  ```yaml
  groups:
    - name: "Feature Team"
      roles:
        - name: "Feature Developer"
          agent: .github/agents/coder.agent.md
          delegate: true   # routes via Copilot SDK
  ```

  ## Example Usage

  ```
  @flow #file:cli-autonomous-worktree.flow.yaml

  Add user authentication feature with JWT tokens:
  - Login endpoint
  - Token validation middleware
  - Password hashing
  ```

  ## When to Use

  - **Large features** requiring multiple files
  - **Parallel work** — two teams build and test simultaneously without conflicts
  - **Experimental changes** you want to review before merging
  - **High-confidence tasks** with clear requirements

  ## Advanced Usage

  ### With multiple specialised roles and SDK delegation
  ```yaml
  groups:
    - name: "Backend"
      roles:
        - name: "Backend Developer"
          prompt: Focus on server-side implementation
          model: "claude-sonnet-4.5"
          delegate: true
    - name: "Frontend"
      roles:
        - name: "Frontend Developer"
          prompt: Focus on UI components
          model: "gpt-5"
          delegate: true
  join:
    name: "Integration Reviewer"
    prompt: Review and integrate both outputs
  ```
